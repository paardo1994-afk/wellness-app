<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Apoyo emocional privado y anónimo con IA local y recursos de emergencia por país.">
    <title>Wellness Support | Privacidad Total</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">
</head>
<body>
    <main id="app-container">
        <header>
            <span class="status-indicator">● Conexión Privada y Segura</span>
        </header>

        <section id="input-section">
            <h1>¿Cómo te sientes hoy?</h1>
            <p>Tu texto se analiza localmente con IA y nunca sale de este dispositivo. Privacidad radical garantizada.</p>
            <textarea id="mood-input" placeholder="Escribe aquí libremente lo que tienes en mente..."></textarea>
            <button id="btn-analyze" class="btn-primary">Analizar y Buscar Ayuda</button>
        </section>

        <section id="results-section" class="hidden">
            <div id="ai-feedback"></div>
            <div id="emergency-numbers"></div>
            
            <div style="margin-top: 30px; border-top: 1px dashed #e2e8f0; padding-top: 20px;">
                <button id="btn-purge" style="background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;">
                    🗑️ Borrar rastro de esta sesión
                </button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
