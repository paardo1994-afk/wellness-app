<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Support | Privacidad Total</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app-container">
        <header>
            <span class="status-indicator">● Conexión Privada y Segura</span>
        </header>

        <section id="input-section">
            <h1>¿Cómo te sientes hoy?</h1>
            <p>Tu texto se analiza localmente con IA y nunca sale de este dispositivo.</p>
            <textarea id="mood-input" placeholder="Escribe aquí libremente lo que tienes en mente..."></textarea>
            <button id="btn-analyze" class="btn-primary">Analizar y Buscar Ayuda</button>
        </section>

        <section id="results-section" class="hidden">
            <div id="ai-feedback"></div>
            <div id="emergency-numbers"></div>
            <button id="btn-purge">🗑️ Borrar rastro de esta sesión</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
